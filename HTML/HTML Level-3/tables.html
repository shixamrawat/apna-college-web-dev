<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h2>Table</h2>
    <!-- Table are used to display table -->
     <!-- we can use border="black" in table tag to create a boarder but it's not a good practice -->
    <!-- semantics used in table are
     thead for head of table
     tbody for body of table
     tfoot for foot of table -->
    <table >
        <caption>Fruit table</caption>
        <thead>
            <tr>
                <th>Food</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Apple</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Mango</td>
                <td>40</td>
            </tr>
            <tr>
                <td>Kiwi</td>
                <td>100</td>
            </tr>
        </tbody>
    </table>
    <br>
    <!-- colspan and rowspan
     colspan is used when a single cell require more than one single column
     rowspan is used when a single cell require more than one single row -->

     <table border="black">
        <caption>Fruit Items</caption>
        <thead>
            <tr>
                <th rowspan="2">Fruit</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>

        </thead>
        <tbody>
            <tr>
                <td>Apple</td>
                <td>50</td>
                <td>0.45</td>
            </tr>
            <tr>
                <td>Mango</td>
                <td>40</td>
                <td>0.40</td>
            </tr>
            <tr>
                <td>Kiwi</td>
                <td>100</td>
                <td>1.05</td>
            </tr>
        </tbody>
     </table>
    
</body>
</html>
