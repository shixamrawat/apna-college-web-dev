<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 2 Part 1</title>
</head>
<body>
    <!-- Block element :- these elements occupy the whole line of space even if they dont need it -->
    <!-- exaple heading<h1>,</h1> tag paragraph tag<p></p> -->
    <h2>Block element</h2>
    <p>paragraph tag</p>
    <hr>
    <h2>Inline elements</h2>
    <!-- Inline element :- these elements occupe the space they need i.e we can add multiple inline elment in same line-->
    <!--eg anchor tag <a></a>  -->
    <a href="https://www.google.com/?zx=1774463809117&no_sw_cr=1">Google</a>
    <a href="https://www.netflix.com/browse">Netflix</a>
    <hr>
    
    <!-- Div is used to club different html elements together -->
    <!-- it doesn't have any functionality of it's own . It's a block element-->
     <h2>Div element</h2>
    <div>
        <a href="https://www.google.com/?zx=1774463809117&no_sw_cr=1">Google</a>
        <a href="https://www.netflix.com/browse">Netflix</a>
    </div>
    <a href="https://www.apple.com">Apple</a>
    <hr>
    <h2>Span element</h2>
    <!-- also a container used to hold different html element  -->
    <!-- But this is an inline element while div is an block element -->
    <span>
        <a href="https://www.google.com/?zx=1774463809117&no_sw_cr=1">Google</a>
        <a href="https://www.netflix.com/browse">Netflix</a>
        
    </span>
    <hr>
    <h2>Sub and sup tag</h2>
    <!-- sub means subscribt the smaller character at the bottom of another character  -->
    <p>Subscript (sub)-> H<sub>2</sub>O</p>
    <!-- sup means superscript the smaller character at the top of another character -->
    <p>Superscript (sup)-> (a+b)<sup>2</sup></p>
    <hr>
    <h2>HTML Entities</h2>
    <!-- Start with & and end with ; -->
    <!-- Used to display reserved character and invisible character
        also used  to display character that are not present on keyboard eg star heart-->
    <p>&bigstar;, &hearts; 
        space &nbsp; nbsp no breaking space etc
    </p>
    <hr>
    <h2>Emmet </h2>
    <!-- Emmet  is an tool kit alr installed in vscode  that help up is development 
      like typing ! generates the boiler plate code typing tag name and enter create the tag
      there are several other abreviations we can use to help us in writing code -->

</body>
</html>
