<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 2 Part 2</title>
</head>
<body>
    <header>
        <h2>This is the header of the page</h2>
        <hr>
        <h2>Nav tag</h2>
        <nav>
            <ul>
                <li><a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/nav">Read more at</a></li>
                <li><a href="https://google.com">Use google </a></li>
            </ul>
        </nav>
        <hr>
    </header>
    <main>
        <h2>This is the main part of the page</h2>
        <h2>Semantic tag</h2>
        <!-- these are used to define the section of a html code  these makes websites-> -->
        <!-- meaningful layout and structured, seo(search engine optimization) friendly, readable and screen reader friendly -->
        <h3>Different Semantic tags-></h3>
        <ol type="i">
            <li><h4>Header tag</h4></li>
            <!-- It's used to define the header of a page -->
            <li><h4>Main tag</h4></li>
            <!-- main tag is used to store the main info of a page -->
            <li><h4>Footer tag</h4></li>
            <!-- footer tag is used to add footer to a page -->
            <li><h4>Nav tag</h4></li>
            <!-- this tag is used for navigation withing a page or outside of the page ususally  presnet  in header -->
            <li><h4>Article tag</h4></li>
            <!-- The <article> tag is used for content that is self-contained and independent. -->
            <li><h4>Section tag</h4></li>
            <!-- A logical chunk of a larger whole. -->
            <li><h4>Aside tag</h4></li>
            <!-- Extra info or sidebar content. -->
        </ol>
        <hr>
        <footer><h2>This is the footer of the page</h2></footer>
    </main>
</body>
</html>
