<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        /* this is the selector that defines which elements will be affected by this style we can make numerous 
        selector as we need */
        h3{
            /*  we use the property : value to set property  */
            color: blue;
        }
    </style>
    <link rel="stylesheet" href="intro.css">
</head>
<body>
    <!-- CSS - It's a language that is used to descibe the style in a document  
         There are three ways to implement CSS in an html document   -->
    <!-- 1st way
         Inline - writing style directly inline of each element 
                  we need to write the style for each element individualy again and again-->
    <h1 style="color: red;">Inline </h3>
    <!-- 2nd way
         Style tag - It's used to add style in the whole html document 
                    but the style of one html can't be used in another html
                    it's defined in the head section of html -->
    <h2>Style tag</h2>
    <!-- External Stylesheet - writing css in a separate document and linking it with html
                    this allow multiple html files to use a single css code so that all the 
                    html have same style and we dont have to copy paste each time 
                    This is the best way to add css to an html file-->
    <h3>External Stylesheet</h3>

    <p>Hello gng</p>
    
</body>
</html>
